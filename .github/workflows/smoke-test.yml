name: SpotFinder Smoke Test

on:
  push:
    branches:
      - main
      - nanditha-azure-migration

  pull_request:
    branches:
      - main
      - nanditha-azure-migration

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install core dependencies
        run: python -m pip install -r 
requirements.txt

      - name: Install ML dependencies
        run: python -m pip install -r 
requirements-ml.txt

      - name: Create env files for smoke test
        run: |
          cat > telemetry-server/.env <<EOF
          DRIVERNAME=postgresql+psycopg2
          SERVER=${{ secrets.DB_SERVER }}
          DATABASE=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          PORT=${{ secrets.DB_PORT }}
          UUID=test-device
          DEVICE_NAME=telemetry-server
          TOPIC=spotfinder_gps
          EOF

          cat > web-dashboard/.env <<EOF
          DRIVERNAME=postgresql+psycopg2
          SERVER=${{ secrets.DB_SERVER }}
          DATABASE=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          PORT=${{ secrets.DB_PORT }}
          EOF

          cat > edge-device/.env <<EOF
          DEVICE_NAME=edge-device
          UUID=test-device
          TOPIC=spotfinder_gps
          DEBUG=0
          EOF

      - name: Run smoke test
        run: python smoke_test.py

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: smoke-test-report.txt    	 
